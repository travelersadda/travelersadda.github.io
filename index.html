<!DOCTYPE html>
<html>
<head>
  <title>Travelers Adda</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    /* Navbar */
    .navbar {
      background: #0a2540;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      color: white;
      font-size: 22px;
      font-weight: bold;
    }

    .menu a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 16px;
    }

    .menu a:hover {
      color: #00bcd4;
    }

    /* Hero Section */
    .hero {
      height: 80vh;
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
    }

    .hero h1 {
      font-size: 40px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">Travelers Adda</div>
    <div class="menu">
      <a href="#">Destinations</a>
      <a href="#">Blog</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <!-- Hero Section -->
  <div class="hero">
    <h1>Explore The World With Travelers Adda 🌍</h1>
  </div>

</body>
</html>
